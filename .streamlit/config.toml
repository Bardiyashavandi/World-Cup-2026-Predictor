# Streamlit theme for the World Cup 2026 Predictor dashboard.
# Pitch-green primary with a clean dark-on-light palette.

[theme]
primaryColor = "#2ecc71"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1b2230"
textColor = "#fafafa"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
