<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2ecc71"/>
    </marker>
  </defs>
  <rect width="900" height="300" rx="16" fill="#161d2b"/>
  <text x="28" y="38" font-size="19" font-weight="800" fill="#f4f6fb">How it works</text>

  <!-- pipeline row -->
  <g>
    <!-- box helper styling repeated inline -->
    <g>
      <rect x="24" y="70" width="138" height="62" rx="10" fill="#1d2636" stroke="#2a3446"/>
      <text x="93" y="97" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f4f6fb">Raw data</text>
      <text x="93" y="116" text-anchor="middle" font-size="11.5" fill="#9aa7bd">6 sources</text>
    </g>
    <g>
      <rect x="198" y="70" width="138" height="62" rx="10" fill="#1d2636" stroke="#2a3446"/>
      <text x="267" y="97" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f4f6fb">Features</text>
      <text x="267" y="116" text-anchor="middle" font-size="11.5" fill="#9aa7bd">24 per match</text>
    </g>
    <g>
      <rect x="372" y="70" width="150" height="62" rx="10" fill="#13301f" stroke="#2ecc71" stroke-opacity="0.5"/>
      <text x="447" y="97" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2ecc71">9 models</text>
      <text x="447" y="116" text-anchor="middle" font-size="11" fill="#9aa7bd">stats · ML · stakes</text>
    </g>
    <g>
      <rect x="558" y="70" width="138" height="62" rx="10" fill="#1d2636" stroke="#2a3446"/>
      <text x="627" y="97" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f4f6fb">Ensemble</text>
      <text x="627" y="116" text-anchor="middle" font-size="11.5" fill="#9aa7bd">backtest-tuned</text>
    </g>
    <g>
      <rect x="732" y="70" width="144" height="62" rx="10" fill="#1d2636" stroke="#2a3446"/>
      <text x="804" y="97" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f4f6fb">Market blend</text>
      <text x="804" y="116" text-anchor="middle" font-size="11.5" fill="#9aa7bd">optional</text>
    </g>

    <g stroke="#2ecc71" stroke-width="2" marker-end="url(#arr)">
      <line x1="164" y1="101" x2="194" y2="101"/>
      <line x1="338" y1="101" x2="368" y2="101"/>
      <line x1="524" y1="101" x2="554" y2="101"/>
      <line x1="698" y1="101" x2="728" y2="101"/>
    </g>
  </g>

  <!-- down arrow to outputs -->
  <line x1="627" y1="132" x2="627" y2="196" stroke="#2ecc71" stroke-width="2" marker-end="url(#arr)"/>

  <!-- outputs row -->
  <rect x="24" y="206" width="852" height="62" rx="10" fill="#1d2636" stroke="#2a3446"/>
  <text x="450" y="232" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f4f6fb">Outputs</text>
  <text x="450" y="252" text-anchor="middle" font-size="12" fill="#9aa7bd">Streamlit dashboard  ·  live board  ·  standings  ·  scorecard  ·  knockout bracket  ·  CSVs</text>

  <!-- live loop -->
  <text x="838" y="156" text-anchor="end" font-size="11" fill="#5f6b80">⟳ re-runs live after each matchday</text>
</svg>
