<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2a18"/>
      <stop offset="0.55" stop-color="#0e1117"/>
      <stop offset="1" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ecc71"/>
      <stop offset="1" stop-color="#27e0a0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#2ecc71" stroke-opacity="0.10" fill="none" stroke-width="2.5">
    <line x1="600" y1="60" x2="600" y2="570"/>
    <circle cx="600" cy="315" r="120"/>
    <rect x="60" y="195" width="150" height="240" rx="6"/>
    <rect x="990" y="195" width="150" height="240" rx="6"/>
  </g>
  <circle cx="600" cy="315" r="9" fill="#2ecc71" fill-opacity="0.55"/>

  <text x="600" y="250" text-anchor="middle" font-size="92" font-weight="800" fill="#f4f6fb">
    World Cup 2026
  </text>
  <text x="600" y="350" text-anchor="middle" font-size="86" font-weight="800" fill="url(#grn)">
