    <rect x="808" y="452" width="180" height="58" rx="29" fill="#161d2b" stroke="#2a3446"/>
    <text x="898" y="490" text-anchor="middle" fill="#2ecc71">live updating</text>
  </g>

  <text x="600" y="560" text-anchor="middle" font-size="18" fill="#5f6b80">
