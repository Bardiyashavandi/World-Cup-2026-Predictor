<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2a18"/>
      <stop offset="0.55" stop-color="#0e1117"/>
      <stop offset="1" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ecc71"/>
      <stop offset="1" stop-color="#27e0a0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" rx="20" fill="url(#bg)"/>

  <!-- subtle pitch markings -->
  <g stroke="#2ecc71" stroke-opacity="0.10" fill="none" stroke-width="2">
    <line x1="600" y1="24" x2="600" y2="316"/>
    <circle cx="600" cy="170" r="74"/>
    <rect x="24" y="96" width="120" height="148" rx="4"/>
    <rect x="1056" y="96" width="120" height="148" rx="4"/>
  </g>
  <circle cx="600" cy="170" r="6" fill="#2ecc71" fill-opacity="0.5"/>

  <!-- title -->
  <text x="600" y="120" text-anchor="middle" font-size="58" font-weight="800" fill="#f4f6fb" letter-spacing="0.5">
    World Cup 2026 <tspan fill="url(#grn)">Predictor</tspan>
  </text>
  <text x="600" y="162" text-anchor="middle" font-size="22" fill="#9aa7bd">
    A 9-model ML ensemble forecasting every match — scorelines, odds, standings &amp; the bracket
  </text>

  <!-- stat chips -->
  <g font-size="19" font-weight="700">
    <g>
      <rect x="300" y="208" width="172" height="52" rx="26" fill="#161d2b" stroke="#2a3446"/>
      <text x="386" y="241" text-anchor="middle" fill="#2ecc71">9 models</text>
    </g>
    <g>
      <rect x="486" y="208" width="228" height="52" rx="26" fill="#161d2b" stroke="#2a3446"/>
      <text x="600" y="241" text-anchor="middle" fill="#2ecc71">64% accuracy</text>
    </g>
    <g>
      <rect x="728" y="208" width="172" height="52" rx="26" fill="#161d2b" stroke="#2a3446"/>
      <text x="814" y="241" text-anchor="middle" fill="#2ecc71">live updating</text>
    </g>
  </g>

  <text x="600" y="298" text-anchor="middle" font-size="15" fill="#5f6b80">
    USA · Canada · Mexico   ·   ensemble · market-blended · backtested
  </text>
</svg>
